<header class="header">
    <div class="container header-container">
        <div class="header-content">
            <div class="logo">
                <a href="index.html"><img src="/public/images/fasa-logo.jpeg" alt="Fasa Products"></a>
            </div>
            <nav class="nav" id="nav">
                <ul class="nav-list">
                    <li><a href="/" id="nav-home">Home</a></li>
                    <li><a href="#products" id="nav-products">Products</a></li>
                    <li><a href="#best-sellers" id="nav-best-sellers">Best Sellers</a></li>
                    <li><a href="#offers" id="nav-offers">Offers</a></li>
                    <li><a href="#contact" id="nav-contact">Contact</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <!-- Cart Icon -->
                <div class="cart-icon-wrapper" id="cartToggle" aria-label="Shopping Cart">
                    <img src="/public/images/cart.png" alt="" class="cart-icon" aria-hidden="true">
                    <span class="cart-badge cart-count">0</span>
                </div>

                <!-- Mobile Menu Toggle -->
                <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </div>
</header>
<nav class="breadcrumb" aria-label="Breadcrumb">
    <div class="container">
        <ol class="breadcrumb-list">
            <li class="breadcrumb-item">
                <a href="index.html" class="breadcrumb-link breadcrumb-link--home">
                    <svg class="breadcrumb-home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <path d="M9 22V12h6v10" />
                    </svg>
                    <span>Home</span>
                </a>
            </li>
            <li class="breadcrumb-item">
                <span class="breadcrumb-separator" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m9 18 6-6-6-6" />
                    </svg>
                </span>
                <a href="index.html#products" class="breadcrumb-link">Products</a>
            </li>
            <li class="breadcrumb-item breadcrumb-item--current">
                <span class="breadcrumb-separator" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m9 18 6-6-6-6" />
                    </svg>
                </span>
                <span class="breadcrumb-current" id="breadcrumbProductName">Product</span>
            </li>
        </ol>
    </div>
</nav>
<div class="cart-sidepanel" id="cartSidepanel">
    <div class="cart-header">
        <div class="cart-header-lead">
            <span class="cart-header-icon" aria-hidden="true">
                <img src="/public/images/cart.png" alt="" class="cart-header-icon-image" aria-hidden="true">
            </span>
            <div class="cart-header-titles">
                <h2>Shopping Cart</h2>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
        <button type="button" class="close-btn" id="cartClose" aria-label="Close shopping cart">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" />
            </svg>
        </button>
    </div>
    <div id="cartItems"></div>

    <div class="cart-summary" id="cartSummary" style="display: none;">
        <div class="cart-delivery-form" id="cartDeliveryForm">
            <label class="cart-form-group">
                <span>Delivery Type</span>
                <select id="deliveryType" required>                
                    <option value="Courier">Courier</option>
                    <option value="Cash on delivery">Cash on delivery</option>
                </select>
            </label>
            <label class="cart-form-group">
                <span>Address Line 1</span>
                <input type="text" id="deliveryAddress1" placeholder="House no, street" required>
            </label>
            <label class="cart-form-group">
                <span>Address Line 2</span>
                <input type="text" id="deliveryAddress2" placeholder="Area / city" required>
            </label>
            <label class="cart-form-group">
                <span>District</span>
                <select id="deliveryDistrict" required>
                    <option value="Ampara">Ampara</option>
                    <option value="Anuradhapura">Anuradhapura</option>
                    <option value="Badulla">Badulla</option>
                    <option value="Batticaloa">Batticaloa</option>
                    <option value="Colombo">Colombo</option>
                    <option value="Galle">Galle</option>
                    <option value="Gampaha">Gampaha</option>
                    <option value="Hambantota">Hambantota</option>
                    <option value="Jaffna">Jaffna</option>
                    <option value="Kalutara">Kalutara</option>
                    <option value="Kandy">Kandy</option>
                    <option value="Kegalle">Kegalle</option>
                    <option value="Kilinochchi">Kilinochchi</option>
                    <option value="Kurunegala">Kurunegala</option>
                    <option value="Mannar">Mannar</option>
                    <option value="Matale">Matale</option>
                    <option value="Matara">Matara</option>
                    <option value="Monaragala">Monaragala</option>
                    <option value="Mullaitivu">Mullaitivu</option>
                    <option value="Nuwara Eliya">Nuwara Eliya</option>
                    <option value="Polonnaruwa">Polonnaruwa</option>
                    <option value="Puttalam">Puttalam</option>
                    <option value="Ratnapura">Ratnapura</option>
                    <option value="Trincomalee">Trincomalee</option>
                    <option value="Vavuniya">Vavuniya</option>
                </select>
            </label>
        </div>
        <div id="cartTotals" style="display: none;">
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">Rs. 0</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span id="shipping">Rs. 0</span>
            </div>
            <div class="summary-row">
                <span>Total</span>
                <span id="total">Rs. 0</span>
            </div>
            <button type="button" class="checkout-btn" id="checkoutBtn" aria-label="Send cart order on WhatsApp">
                Order on WhatsApp
            </button>
        </div>
    </div>
</div>

<div class="cart-overlay" id="cartOverlay"></div>
